<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>联系我们 - 移动端预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      width: 100%;
      max-width: 390px;
      display: block;
    }

    .page img {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    .divider {
      width: 100%;
      max-width: 390px;
      height: 12px;
      background: #333;
    }
    h1 {
    display: block;
   color: #fff;
    font-size: 2em;
    margin-block-start: 0.67em;
    margin-block-end: 0.67em;
    margin-inline-start: 0px;
    margin-inline-end: 0px;
    font-weight: bold;
    unicode-bidi: isolate;
}
  </style>
</head>
<body>

  <div class="page">
    <h1>联系我们</h1>
    <img src="B2_1.jpg" alt="日本旅游包车服务">
  </div>

  <div class="divider"></div>

  <div class="page">
      <h1>联系我们-报错</h1>
    <img src="B2_2.jpg" alt="日本旅游包车-包车接送">
  </div>

  <div class="divider"></div>

  <div class="page">
     <h1>联系我们-输入后</h1>
    <img src="B2_3.jpg" alt="日本旅游包车-机场接送">
  </div>

</body>
</html>
